<!DOCTYPE html>
<html>

<head>
    <style>
        table {
            border-collapse: collapse;
        }

        a {
            position: relative;
            display: inline-block;
        }

        img {
            width: 250px;
            display: block;
        }

        .sudut {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 5px solid #FF0000;
        }

        .kiri-atas {
            top: 0;
            left: 0;
            border-right: none;
            border-bottom: none;
        }

        .kanan-atas {
            top: 0;
            right: 0;
            border-left: none;
            border-bottom: none;
        }

        .kiri-bawah {
            bottom: 0;
            left: 0;
            border-top: none;
            border-right: none;
        }

        .kanan-bawah {
            bottom: 0;
            right: 0;
            border-top: none;
            border-left: none;
        }

        a:hover .sudut {
            border-color: #FF00FF;
        }
    </style>
</head>

<body>

    <table>
        <tr>
            <td>
                <a href="#">
                    <img src="src/star.jpg" alt="star">

                    <div class="sudut kiri-atas"></div>
                    <div class="sudut kanan-atas"></div>
                    <div class="sudut kiri-bawah"></div>
                    <div class="sudut kanan-bawah"></div>
                </a>
            </td>
        </tr>
    </table>

</body>

</html>
