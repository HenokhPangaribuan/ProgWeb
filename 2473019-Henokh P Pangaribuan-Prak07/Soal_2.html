<!DOCTYPE html>
<html>

<head>
    <style>
        table {
            border-collapse: collapse;
            width: 420px;
        }

        th {
            padding: 10px;
            border: 1px solid white;
            text-align: left;
        }

        td {
            padding: 10px;
            border: 1px solid white;
        }

        .header {
            background-color: #8FA88F;
        }

        .biru {
            background-color: #8FAED1;
        }

        .oranye {
            background-color: #E6B894;
        }

        .c3 {
            background-color: #CCFFAA;
        }
    </style>

    <script>
        function highlightRow(clickme) {
            document.getElementById(clickme).className = "c3";
        }

        function normalRow(clickme, warna) {
            document.getElementById(clickme).className = warna;
        }
    </script>

</head>

<body>

    <table>

        <tr id="r0" class="header" onmouseover="highlightRow('r0')" onmouseout="normalRow('r0','header')">
            <th>Peringkat</th>
            <th>Bahasa Pemrograman</th>
            <th>Nilai</th>
        </tr>

        <tr id="r1" class="biru" onmouseover="highlightRow('r1')" onmouseout="normalRow('r1','biru')">
            <td>1</td>
            <td>C</td>
            <td>18.058%</td>
        </tr>

        <tr id="r2" class="oranye" onmouseover="highlightRow('r2')" onmouseout="normalRow('r2','oranye')">
            <td>2</td>
            <td>Java</td>
            <td>18.051%</td>
        </tr>

        <tr id="r3" class="biru" onmouseover="highlightRow('r3')" onmouseout="normalRow('r3','biru')">
            <td>3</td>
            <td>C++</td>
            <td>9.707%</td>
        </tr>

        <tr id="r4" class="oranye" onmouseover="highlightRow('r4')" onmouseout="normalRow('r4','oranye')">
            <td>4</td>
            <td>PHP</td>
            <td>9.662%</td>
        </tr>

        <tr id="r5" class="biru" onmouseover="highlightRow('r5')" onmouseout="normalRow('r5','biru')">
            <td>5</td>
            <td>(Visual) Basic</td>
            <td>6.392%</td>
        </tr>

    </table>

</body>

</html>
