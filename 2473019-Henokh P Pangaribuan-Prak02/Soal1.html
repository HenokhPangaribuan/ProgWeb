<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabel</title>
</head>
<body>
<table width="500" height="500" border="1" align="center"> 
    <tr> 
        <td colspan="6" style="background-color: blue; text-align: center;">a</td>
        <td rowspan="4" style="background-color: yellow; text-align: center;">d</td>
    </tr>
    <tr>
        <td rowspan="4" style="background-color: yellow ; text-align: center;">g</td>
        <td colspan="3" style="background-color: red; text-align: center;">b</td>
        <td rowspan="3" style="background-color: green; text-align: center;">c</td>
    </tr>
    <tr>
        <td rowspan="2" style="background-color: green; text-align: center;">f</td>
        <td style="background-color: black; text-align: center;">e</td>
    </tr>
    <tr>
        <td colspan="4" style="background-color: red; text-align: center;">e</td>
    </tr>
    <tr>
        <td colspan="6" style="background-color: blue; text-align: center;">h</td>
    </tr>
</table>
</body>
</html>
