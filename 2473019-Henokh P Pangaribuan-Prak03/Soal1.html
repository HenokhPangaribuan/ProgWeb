<!DOCTYPE html>
<html>

<head>
    <title>Edit Profile</title>
</head>

<body>
    <form>
        <table width="540" border="2" align="center">
            <tr>
                <td colspan="2" style="background-color:gray; text-align:center; font-size:26px; font-weight:bold;">
                    Edit Profile
                </td>
            </tr>

            <tr>
                <td width="160" align="center">
                    <img src="https://upload.wikimedia.org/wikipedia/az/thumb/3/30/Patrick-1.jpg/250px-Patrick-1.jpg" width="100" height="100" style="border:1px solid black;"> <br><br>
                    <input type="button" value="Upload">
                </td>

                <td>
                    <table width="100%" border="0">
                        <tr>
                            <td width="150">Name</td>
                            <td>:</td>
                            <td>
                                <input type="text" name="name">
                            </td>
                        </tr>

                        <tr>
                            <td>Position</td>
                            <td>:</td>
                            <td>
                                <select name="position">

                                    <optgroup label="Programmer">
                                        <option selected>Senior Programmer</option>
                                        <option>Junior Programmer</option>
                                    </optgroup>

                                    <optgroup label="System Analyst">
                                        <option>Senior Analyst</option>
                                        <option>Junior Analyst</option>
                                    </optgroup>
                                </select>
                            </td>
                        </tr>

                        <tr>
                            <td>Password</td>
                            <td>:</td>
                            <td>
                                <input type="text" name="password">
                            </td>
                        </tr>

                        <tr>
                            <td>Confirm Password</td>
                            <td>:</td>
                            <td>
                                <input type="password" name="confirm">
                            </td>
                        </tr>
                    </table>
                    <br>
                    <div align="right">
                        <input type="reset" value="Reset">
                        <input type="submit" value="Update">
                    </div>
                </td>
            </tr>
        </table>
    </form>
</body>

</html>
